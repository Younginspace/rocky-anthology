    <!-- Cache-busting for Chinese Android browsers (Quark/UC/Baidu/WeChat) that
         ignore HTTP must-revalidate and serve stale HTML. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" href="/favicon.svg" />
    <title>星际长途 · 打给 Rocky</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Stale-bundle auto-recovery — Chinese Android browsers routinely ignore
      // Cache-Control AND meta cache hints, pinning users on an old index-*.js.
      // ~2s after first paint, fetch fresh HTML (no-store), compare the main
      // bundle filename, and reload if we're running a stale one.
      (function () {
        setTimeout(function () {
          try {
            fetch('/?cb=' + Date.now(), { cache: 'no-store', credentials: 'omit', headers: { 'Cache-Control': 'no-cache' } })
              .then(function (r) { return r.ok ? r.text() : null; })
              .then(function (html) {
                if (!html) return;
                var m = html.match(/\/assets\/(index-[A-Za-z0-9_-]+\.js)/);
                if (!m) return;
                var fresh = m[1];
                var loaded = Array.prototype.map.call(document.querySelectorAll('script[src]'), function (s) { return s.getAttribute('src') || ''; });
                if (!loaded.some(function (src) { return src.indexOf(fresh) !== -1; })) {
                  setTimeout(function () { window.location.reload(); }, 100);
                }
              })
              .catch(function () {});
          } catch (e) {}
        }, 2000);
      })();
    </script>
  </body>
</html>
