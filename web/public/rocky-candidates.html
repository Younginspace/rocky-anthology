<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Rocky hero 候选 · 挑一张</title>
<style>
  @font-face { font-family:'Patrick Hand'; src:url('/fonts/PatrickHand-Regular.ttf') format('truetype'); font-display:swap; }
  :root{ --paper:#f3ead8; --ink:#5b4a36; --teal:#2f9d8d; --amber:#d2853a; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ background:var(--paper); color:var(--ink); font-family:'Songti SC','Noto Serif CJK SC',Georgia,serif; line-height:1.8; padding:24px 16px 60px; }
  .wrap{ max-width:720px; margin:0 auto; }
  h1{ font-family:'Patrick Hand',cursive; font-size:26px; text-align:center; color:#3c3328; }
  .sub{ text-align:center; color:#9c8d76; font-family:'Patrick Hand',cursive; font-size:15px; margin:4px 0 8px; }
  .pass{ text-align:center; font-size:14.5px; color:#2f6b61; background:#d7ebe5; border:1.5px solid #3f9d8d55; border-radius:12px; padding:8px 14px; margin:10px 0 22px; }
  .cand{ background:#fbf5e9; border:1.5px solid #d8c6a8; border-radius:18px; padding:10px; margin-bottom:26px; box-shadow:0 10px 30px -18px #00000033; }
  .cand img{ display:block; width:100%; border-radius:12px; }
  .cand .label{ font-family:'Patrick Hand',cursive; font-size:22px; text-align:center; padding:10px 0 4px; color:#a85f24; }
  .note{ color:#6e6151; font-size:14.5px; text-align:center; line-height:2; margin-top:6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>ROCKY hero 候选 · 挑一张</h1>
  <div class="sub">4 张都已通过五肢校验，选你最喜欢的</div>
  <div class="pass">✅ 每张均为：3 条下肢 + 2 条上肢 · 每肢 3 指 · 无脸 · 圆石身 · teal 荧光斑 · 水彩</div>

  <div class="cand"><div class="label">① 一号</div><img src="/candidates/c1.jpg" alt="候选1" /></div>
  <div class="cand"><div class="label">② 二号</div><img src="/candidates/c2.jpg" alt="候选2" /></div>
  <div class="cand"><div class="label">③ 三号</div><img src="/candidates/c3.jpg" alt="候选3" /></div>
  <div class="cand"><div class="label">④ 四号</div><img src="/candidates/c4.jpg" alt="候选4" /></div>

  <p class="note">
    回复编号（如「用 2 号」）→ 我把它设为首页 hero 顶图，<br/>
    并用它作首帧生成 onboarding 开场视频。都不满意也可以让我再生一批。
  </p>
</div>
</body>
</html>
